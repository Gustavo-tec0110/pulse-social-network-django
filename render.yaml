services:
  - type: web
    name: pulse-social-network-django
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_demo
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: pulse-social-network-django.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://pulse-social-network-django.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
