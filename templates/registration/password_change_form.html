{% extends "base.html" %}
{% block title %}Alterar senha · Pulse{% endblock %}
{% block content %}
  <section class="page-header"><div><p class="eyebrow">Segurança</p><h1>Alterar senha</h1></div></section>
  <section class="surface form-surface">
    <form method="post" class="stacked-form">
      {% csrf_token %}
      {% for field in form %}
        <div class="field"><label for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<small class="field-error">{{ error }}</small>{% endfor %}</div>
      {% endfor %}
      <button class="button button-primary" type="submit">Salvar nova senha</button>
    </form>
  </section>
{% endblock %}
