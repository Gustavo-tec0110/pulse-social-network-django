{% if page_obj.has_other_pages %}
  <nav class="pagination" aria-label="Paginação">
    {% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">← Anterior</a>{% else %}<span></span>{% endif %}
    <span>Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">Próxima →</a>{% else %}<span></span>{% endif %}
  </nav>
{% endif %}
